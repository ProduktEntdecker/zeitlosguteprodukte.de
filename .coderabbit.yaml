# CodeRabbit Configuration — ProduktEntdecker Org Standard
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "de"
tone_instructions: "Sei direkt und pragmatisch. Fokus auf Bugs und Sicherheit, nicht auf Style-Nitpicks."
early_access: true

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  collapse_walkthrough: true
  poem: false
  in_progress_fortune: false
  sequence_diagrams: false
  changed_files_summary: true
  assess_linked_issues: true
  related_issues: true
  related_prs: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

  path_filters:
    - "!**/node_modules/**"
    - "!**/package-lock.json"
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/__snapshots__/**"
    - "!**/*.min.js"
    - "!**/.worktrees/**"

  tools:
    eslint:
      enabled: true
    semgrep:
      enabled: true
    gitleaks:
      enabled: true
    shellcheck:
      enabled: true

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
